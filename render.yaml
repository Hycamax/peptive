services:
  - type: web
    name: peptive
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: node rebuild_catalog.js && node server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: PORT
        value: 3000
    disk:
      name: peptive-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
